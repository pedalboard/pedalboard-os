# Hardware watchdog configuration for live reliability.
# If the system hangs, the hardware watchdog reboots automatically.
#
# The BCM2712 (CM5) has a built-in watchdog that systemd can manage.
# RuntimeWatchdogSec: systemd pings the watchdog at half this interval.
#                     If the system hangs longer, hardware forces a reboot.
# RebootWatchdogSec:  Max time for a clean reboot before hardware forces it.

[Manager]
RuntimeWatchdogSec=15
RebootWatchdogSec=60
